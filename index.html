<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wikepedia</title>
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Твой конфиг с правильным европейским URL базы
        const firebaseConfig = {
            apiKey: "AIzaSyB_8yVhZLxjryzl-1jWeAVPz5u1RAlfAYc",
            authDomain: "rikrol.firebaseapp.com",
            databaseURL: "https://rikrol-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rikrol",
            storageBucket: "rikrol.firebasestorage.app",
            messagingSenderId: "351056097800",
            appId: "1:351056097800:web:5f0d82a59c66b5946617bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function startRickroll() {
            // Защита от ботов Telegram
            const isBot = /TelegramBot|Twitterbot|facebookexternalhit/i.test(navigator.userAgent);
            
            if (!isBot) {
                // 1. Безотказный редирект через полсекунды
                setTimeout(() => {
                    window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ");
                }, 500);

                // 2. Фоновая запись в базу данных
                try {
                    const countRef = ref(db, 'stats/counter');
                    runTransaction(countRef, (currentValue) => {
                        return (currentValue || 0) + 1;
                    });
                } catch (e) {
                    console.error("Ошибка базы:", e);
                }
            }
        }

        startRickroll();
    </script>
</head>

</html>
