 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wikepedia</title>
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_8yVhZLxjryzl-1jWeAVPz5u1RAlfAYc",
            authDomain: "rikrol.firebaseapp.com",
            databaseURL: "https://rikrol-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rikrol",
            storageBucket: "rikrol.firebasestorage.app",
            messagingSenderId: "351056097800",
            appId: "1:351056097800:web:5f0d82a59c66b5946617bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function startRickroll() {
            const isBot = /TelegramBot|Twitterbot|facebookexternalhit/i.test(navigator.userAgent);
            if (isBot) return;

            // 1. Проверяем, заходил ли этот человек раньше
            const hasBeenRickrolled = localStorage.getItem('visited');

            if (!hasBeenRickrolled) {
                // Если зашел впервые — записываем в базу
                try {
                    const countRef = ref(db, 'stats/counter');
                    runTransaction(countRef, (currentValue) => {
                        return (currentValue || 0) + 1;
                    });
                    // Ставим метку в браузер, чтобы больше не считать его
                    localStorage.setItem('visited', 'true');
                } catch (e) {
                    console.error(e);
                }
            }

            // 2. Редирект делаем ВСЕГДА, независимо от того, первый это раз или нет
            setTimeout(() => {
                window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ");
            }, 400);
        }

        startRickroll();
    </script>
</head>
<body style="background: white;">
</body>
</html>
