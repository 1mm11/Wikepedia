<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_8yVhZLxjryzl-1jWeAVPz5u1RAlfAYc",
            authDomain: "rikrol.firebaseapp.com",
            projectId: "rikrol",
            storageBucket: "rikrol.firebasestorage.app",
            messagingSenderId: "351056097800",
            appId: "1:351056097800:web:5f0d82a59c66b5946617bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Бронебойный редирект
        function goRick() {
            window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ");
        }

        function start() {
            // Проверка на бота
            const isBot = /TelegramBot|Twitterbot|facebookexternalhit/i.test(navigator.userAgent);
            if (isBot) return;

            // 1. ГАРАНТИРОВАННЫЙ РЕДИРЕКТ. 
            // Сработает через полсекунды, что бы ни случилось с базой.
            setTimeout(goRick, 500);

            // 2. ПАРАЛЛЕЛЬНАЯ ЗАПИСЬ В БАЗУ.
            // Делаем это в фоне, не заставляя пользователя ждать.
            try {
                const countRef = ref(db, 'stats/counter');
                runTransaction(countRef, (currentValue) => {
                    return (currentValue || 0) + 1;
                });
            } catch (e) {
                // Если база выдаст ошибку, мы её просто игнорируем
            }
        }

        start();
    </script>
</head>
<body style="background: white;">
</body>
</html>
