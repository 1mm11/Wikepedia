<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wikepedia</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">

    <script>
        // Функция для перехода
        function redirect() {
            var isBot = /TelegramBot|Twitterbot|facebookexternalhit|vkShare|WhatsApp/i.test(navigator.userAgent);
            
            // Если это НЕ бот, перекидываем через полсекунды
            if (!isBot) {
                setTimeout(function() {
                    window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ");
                }, 500); // Задержка 500мс, чтобы бот не пошел следом
            }
        }
        
        window.onload = redirect;
    </script>
</head>
<body style="background-color: #ffffff;">
    </body>
</html>
